# Shared tmux configuration.

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g detach-on-destroy off

setw -g mode-keys vi
set -g status-keys vi

unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[bg=#98971a,fg=#282828,bold] #S #[bg=#3c3836,fg=#98971a] >"
set -g status-right "#[fg=#928374]#{pane_current_path} #[fg=#504945]| #[fg=#fabd2f]%Y-%m-%d #[fg=#fe8019]%H:%M "

setw -g window-status-separator ""
setw -g window-status-format "#[bg=#3c3836,fg=#928374] #I:#W "
setw -g window-status-current-format "#[bg=#458588,fg=#fbf1c7,bold] #I:#W "

set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#83a598"
set -g message-style "bg=#3c3836,fg=#ebdbb2"
set -g mode-style "bg=#504945,fg=#fabd2f"
